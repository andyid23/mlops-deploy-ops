global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'tensorflow-serving-railway'
    metrics_path: '/monitoring'  # <-- Path yang benar
    scrape_interval: 5s
    static_configs:
      - targets: ['mlops-deploy.up.railway.app:443']  # <-- Gunakan port 443 untuk HTTPS
    scheme: 'https'  # <-- Wajib karena Railway menggunakan HTTPS